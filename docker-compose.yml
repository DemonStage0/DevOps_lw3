services:
  vault:
    image: hashicorp/vault:1.15
    container_name: devops_lw3-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: devops-lw3-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    command: server -dev
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.15
    container_name: devops_lw3-vault-init
    environment:
      VAULT_ADDR: http://vault:8200
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./vault/init-vault.sh:/init-vault.sh
    entrypoint: sh /init-vault.sh

  db:
    image: postgres:15
    container_name: glass_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glass_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init-db:
    build: .
    container_name: glass_init
    command: python src/csv_to_db.py
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: devops-lw3-root-token
    depends_on:
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data

  web:
    build: .
    container_name: devops_lw3-web
    ports:
      - "8000:8000"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: devops-lw3-root-token
    depends_on:
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      init-db:
        condition: service_completed_successfully
    volumes:
      - ./experiments:/app/experiments
      # Убираем монтирование logfile.log как файла — пусть пишет внутри контейнера

volumes:
  pgdata: